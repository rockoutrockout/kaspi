<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    
    <!-- Изменил viewport: добавил user-scalable=no, чтобы интерфейс не зумился случайно -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    
    <!-- Цвет верхней панели (статус-бара) в браузере -->
    <meta name="theme-color" content="#f2f2f7" />

    <!-- iOS специфичные теги -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- 'black-translucent' сделает статус-бар прозрачным, а контент займет весь экран -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kaspi" />
    
    <meta name="description" content="Kaspi.kz Clone" />
    
    <!-- Иконка для iPhone -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <!-- Манифест PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Kaspi</title>

    <style>
      /* Убираем выделение текста и системные синие рамки при нажатии, 
         чтобы сайт ощущался как приложение */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        user-select: none;
      }
      input, textarea {
        user-select: text;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #f2f4f7;
        /* Предотвращает "резиновый" скролл всей страницы на iOS */
        overscroll-behavior-y: none;
      }
    </style>
  </head>
  <body>
    <noscript>Нужен JavaScript для работы приложения.</noscript>
    <div id="root"></div>
  </body>
</html>
